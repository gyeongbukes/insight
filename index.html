<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>페이지 이동 중...</title>
    <meta name="referrer" content="no-referrer">
    <style>
        body { 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; margin: 0; font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; 
            background-color: #f8f9fa; 
        }
        .spinner { 
            width: 40px; height: 40px; border: 4px solid #e9ecef; border-top: 4px solid #0056b3; 
            border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; 
        }
        @keyframes spin { 
            0% { transform: rotate(0deg); } 
            100% { transform: rotate(360deg); } 
        }
        p { color: #495057; font-size: 16px; font-weight: bold; margin: 0 0 10px 0; }
        .sub-text { color: #868e96; font-size: 13px; font-weight: normal; margin: 0; }
        a { color: #0056b3; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="spinner"></div>
    <p>안전하게 페이지를 이동하고 있습니다.</p>
    <p class="sub-text">잠시 후 이동합니다. 반응이 없으면 <a href="https://script.google.com/macros/s/AKfycbzk4taNyoNqBaTjrBVJTgEhyYI1Eg5eQ3GgIR1sgm43IAU-uxP8TNCqkG92T8-43RRG/exec">여기</a>를 눌러주세요.</p>

    <script>
        setTimeout(function() {
            // 문제가 되었던 replace 대신, 제일 처음 쓰셨던 방식과 똑같이 작동하는 href를 사용합니다.
            window.location.href = "https://script.google.com/macros/s/AKfycbzk4taNyoNqBaTjrBVJTgEhyYI1Eg5eQ3GgIR1sgm43IAU-uxP8TNCqkG92T8-43RRG/exec";
        }, 50);
    </script>
</body>
</html>
