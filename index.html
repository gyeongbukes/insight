<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>페이지 이동 중...</title>
    <style>
        /* 외부 파일 없이 내장 CSS만 사용하여 속도 저하 차단 */
        body { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; 
            background-color: #f8f9fa; /* 깔끔한 연회색 배경 */
        }
        /* 빙글빙글 도는 로딩 스피너 애니메이션 */
        .spinner { 
            width: 40px; 
            height: 40px; 
            border: 4px solid #e9ecef; 
            border-top: 4px solid #0056b3; /* 신뢰감을 주는 파란색 */
            border-radius: 50%; 
            animation: spin 1s linear infinite; 
            margin-bottom: 20px; 
        }
        @keyframes spin { 
            0% { transform: rotate(0deg); } 
            100% { transform: rotate(360deg); } 
        }
        p { 
            color: #495057; 
            font-size: 16px; 
            font-weight: bold;
        }
        .sub-text {
            color: #868e96;
            font-size: 13px;
            font-weight: normal;
            margin-top: 10px;
        }
        a { color: #0056b3; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
    <script>
        // 화면 디자인(DOM)이 렌더링되자마자 즉시 이동 스크립트 실행
        window.onload = function() {
            location.replace("https://script.google.com/macros/s/구글_앱_스크립트_주소/exec");
        };
    </script>
</head>
<body>
    <div class="spinner"></div>
    <p>안전하게 페이지를 이동하고 있습니다.</p>
    <p class="sub-text">잠시 후 이동합니다. 반응이 없으면 <a href="https://script.google.com/macros/s/구글_앱_스크립트_주소/exec">여기</a>를 눌러주세요.</p>
</body>
</html>
